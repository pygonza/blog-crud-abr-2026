{% extends '_base.html' %}

{% block content %}
    <h2>{{ article.title }}</h2>
    <p><strong>Autor:</strong> {{ article.author }}</p>
    <p><small>Fecha de Publicación:</small> {{ article.created_at }}</p>
    <p><strong>Contenido:</strong> {{ article.content }}</p>
    <a href="{% url 'article-update' article.pk %}">Editar Artículo</a>
    <a href="{% url 'article-delete' article.pk %}">Eliminar Artículo</a>
{% endblock %}
