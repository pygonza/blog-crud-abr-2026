{% extends '_base.html' %}

{% block content %}
    <h2>Lista de Articulos</h2>
    <ul>
        {% for publication in article_list %}
            <li>
                <p><a href="{% url 'article-detail' publication.pk %}">{{ publication.title }}</a></p>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
